model:
  default: "claude-sonnet-4-5"
  provider: "anthropic"

agent:
  max_turns: 45

terminal:
  backend: local
  timeout: 300

delegation:
  max_iterations: 20
  max_concurrent_children: 1

tools:
  terminal: true
  web: true
  delegation: true

gateway:
  type: telegram
  bot_token_env: TELEGRAM_BOT_TOKEN_INVESTIGATOR
  chat_id_env: TELEGRAM_CHAT_ID_INVESTIGATOR

allowed_clickhouse_tables:
  - metrics_1m
  - metrics_5m
  - metrics_1h
  - otel_logs
  - otel_traces
  - exemplars
  - exemplars_1h
  - signal_correlations_1h
  - service_latency_percentiles_1h
  - service_error_rates_1h
  - logs_1h
  - qan_metrics
  - audit_logs
  - audit_logs_1h
  - uptime_checks
  - kubernetes_metrics_1h
  - vm_metrics_1h
  - service_map_metrics_1h
  - network_map_traffic_1h
  - network_map_connection_metrics_1h

readonly: true
